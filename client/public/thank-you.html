<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks! | DigiForm</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #f8f9fa;
      color: #1a1d23;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 0.5rem;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      border: 1px solid #eaecef;
    }
    .icon {
      width: 56px;
      height: 56px;
      background: #e8f4f9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg {
      width: 28px;
      height: 28px;
      stroke: #61A5C2;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #5a6070;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      background: #61A5C2;
      color: #fff;
      text-decoration: none;
      padding: 0.65rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .brand {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: #9aa0ac;
    }
    .brand span { font-weight: 700; color: #5a6070; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Thanks!</h1>
    <p>We received your message and will be in touch shortly.</p>
    <a href="/">Back to Home</a>
  </div>
  <p class="brand"><span>Digi</span>form &mdash; North County San Diego</p>
</body>
</html>
